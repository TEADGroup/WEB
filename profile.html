<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Hồ sơ tài khoản — TEA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles: base (chung) → auth (riêng login/profile) -->
  <link rel="stylesheet" href="assets/css/base.css?v=20260711" />
  <link rel="stylesheet" href="assets/css/auth.css?v=20260714" />
</head>
<body>

  <div class="bg-orbs" aria-hidden="true"><span class="orb orb-1"></span><span class="orb orb-2"></span></div>

  <div class="auth-tools">
    <button class="icon-btn lang-btn" id="langBtn" aria-label="Switch language" title="Ngôn ngữ / Language">EN</button>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme" title="Sáng / Tối"></button>
  </div>

  <main class="profile-wrap">
    <div class="profile-card glass">
      <a class="profile-back" href="dashboard/index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span data-vi="Về dashboard" data-en="Back to dashboard">Về dashboard</span>
      </a>

      <!-- PHẦN 1: thông tin tài khoản -->
      <header class="profile-head">
        <div class="avatar-ring">
          <img id="avatarImg" src="" alt="Avatar" />
          <label class="avatar-pick" id="avatarPick" title="Đổi ảnh / Change photo" aria-label="Đổi ảnh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <input type="file" id="avatarInput" accept="image/*" />
          </label>
        </div>
        <h1 class="auth-title" data-vi="Hồ sơ tài khoản" data-en="Account profile">Hồ sơ tài khoản</h1>
        <p class="profile-email" id="emailDisplay">—</p>
      </header>

      <div id="profileWarn"></div>

      <!-- PHẦN 2: chỉnh sửa -->
      <section class="profile-edit">
        <div class="profile-row">
          <label for="nameIn" data-vi="Họ tên" data-en="Full name">Họ tên</label>
          <input type="text" id="nameIn" autocomplete="name" data-ph-vi="Nguyễn Văn A" data-ph-en="Jane Doe" placeholder="Nguyễn Văn A" />
        </div>
        <div class="profile-actions">
          <button class="btn btn-primary" id="saveBtn" data-vi="Lưu tên" data-en="Save name">Lưu tên</button>
          <button class="btn btn-danger" id="signoutBtn" data-vi="Đăng xuất" data-en="Sign out">Đăng xuất</button>
        </div>

        <div class="profile-divider"></div>

        <div class="profile-row">
          <label for="pwIn" data-vi="Mật khẩu mới" data-en="New password">Mật khẩu mới</label>
          <input type="password" id="pwIn" autocomplete="new-password" data-ph-vi="••••••••" data-ph-en="••••••••" placeholder="••••••••" />
        </div>
        <div class="profile-actions">
          <button class="btn btn-ghost" id="updatePwBtn" data-vi="Cập nhật mật khẩu" data-en="Update password">Cập nhật mật khẩu</button>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- Scripts: theme → i18n → supabase UMD → config → auth → profile -->
  <script src="assets/js/theme.js?v=20260711"></script>
  <script src="assets/js/i18n.js?v=20260711"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js?v=20260711"></script>
  <script src="assets/js/auth.js?v=20260711"></script>
  <script src="assets/js/profile.js?v=20260711"></script>
</body>
</html>
