<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Đăng nhập — TEA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles: base (chung) → auth (riêng login/profile) -->
  <link rel="stylesheet" href="assets/css/base.css?v=20260711" />
  <link rel="stylesheet" href="assets/css/auth.css?v=20260711" />
</head>
<body>

  <!-- nút ngôn ngữ + theme (góc trên phải) -->
  <div class="auth-tools">
    <button class="icon-btn lang-btn" id="langBtn" aria-label="Switch language" title="Ngôn ngữ / Language">EN</button>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme" title="Sáng / Tối"></button>
  </div>

  <div class="auth-wrap">
    <div class="auth-card glass">
      <!-- tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tabLogin"    data-vi="Đăng nhập"    data-en="Sign in">Đăng nhập</button>
        <button class="auth-tab"        id="tabRegister" data-vi="Đăng ký"      data-en="Sign up">Đăng ký</button>
      </div>

      <h1 class="auth-title" id="authTitle">Đăng nhập</h1>
      <p class="auth-sub" id="authSub">Vào dashboard giám sát nhà máy</p>

      <div id="authWarn"></div>

      <form id="authForm" novalidate autocomplete="on">
        <div class="auth-field" id="nameField" hidden>
          <label for="regName" data-vi="Họ tên" data-en="Full name">Họ tên</label>
          <input type="text" id="regName" autocomplete="name" data-ph-vi="Nguyễn Văn A" data-ph-en="Jane Doe" placeholder="Nguyễn Văn A" />
        </div>
        <div class="auth-field">
          <label for="emailIn" data-vi="Email" data-en="Email">Email</label>
          <input type="email" id="emailIn" autocomplete="email" required data-ph-vi="ban@email.com" data-ph-en="you@email.com" placeholder="ban@email.com" />
        </div>
        <div class="auth-field has-toggle">
          <label for="pwIn" data-vi="Mật khẩu" data-en="Password">Mật khẩu</label>
          <input type="password" id="pwIn" autocomplete="current-password" required data-ph-vi="••••••••" data-ph-en="••••••••" placeholder="••••••••" />
          <button type="button" class="auth-toggle" id="pwToggle" aria-label="Hiện/ẩn mật khẩu" title="Hiện/ẩn mật khẩu">
            <svg id="pwIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <div class="auth-err" id="authErr" role="alert"></div>

        <button type="submit" class="btn btn-primary auth-btn" id="authSubmit">Đăng nhập</button>
      </form>

      <p class="auth-foot">
        <span id="footLabel">Chưa có tài khoản?</span>
        <button type="button" id="authSwitch">Đăng ký</button>
      </p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Scripts: theme → i18n → supabase UMD → config → auth → login -->
  <script src="assets/js/theme.js?v=20260711"></script>
  <script src="assets/js/i18n.js?v=20260711"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js?v=20260711"></script>
  <script src="assets/js/auth.js?v=20260711"></script>
  <script src="assets/js/login.js?v=20260711"></script>
</body>
</html>
