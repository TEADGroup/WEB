# Supabase local development config.
# Docs: https://supabase.com/docs/guides/local-development
# Adjust ports/redirect URLs as needed for your machine.

project_id = "tea-group"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# HDVH documents can be large; raise as needed.
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Disable email confirmation for local dev convenience.
enable_confirmations = false
